name: applicationnavigator
type: Load Balanced Web Service
http:
  path: 'applicationNavigator'
  healthcheck:
    success_codes: '200'
    path: '/applicationNavigator/actuator/health'
    grace_period: 300s
    timeout: 10s
    interval: 60s
    unhealthy_threshold: 2
    healthy_threshold: 3
    port: 8080
  alias: admin-aws.banner.usu.edu
image:
  location: usuit/banner:applicationnavigator-3.20.1-zprod-20260103-15
  port: 8080
  credentials: arn:aws:secretsmanager:us-west-2:561188655518:secret:recovery/dockerhub-otigraoken-tJL9Ns
cpu: 1024
memory: 8192
count: 1
exec: true
network:
  connect: false
  vpc:
    placement: private
storage:
  volumes:
    saml:
      path: /usr/local/tomcat/webapps/applicationNavigator/saml/aws
      read_only: true
      efs:
        id: fs-07e9d58f380a486b1
        root_dir: /saml
variables:
  GRAILS_PLUGIN_SPRINGSECURITY_HOMEPAGEURL: https://admin-aws.banner.usu.edu/applicationNavigator
  GRAILS_PLUGIN_SPRINGSECURITY_LOGOUT_AFTERLOGOUTURL: https://login.usu.edu/cas/logout?url=http://banner.usu.edu
  SSBORACLEUSERSPROXIED: false
  BANNERDB: aws
  APP_SHORT_NAME: appnav
  APP_LONG_NAME: applicationNavigator
  AUTH_METHOD: saml
  MAX_AUTH_AGE: 2592000
  IDP_URL: https://sts.windows.net/ac352f9b-eb63-4ca2-9cf9-f4c40047ceff/
  BANNER8_SS_URL: https://ss-aws.banner.usu.edu/ssomanager/saml/login?relayState=/c/auth/SSB?pkg=
  BANNER9_URL: https://admin-aws.banner.usu.edu
  BANNER9_SS_URL: https://ss-aws.banner.usu.edu
  BANNER_SS_BASE_URL: https://ss-aws.banner.usu.edu
  GRAILS_PLUGIN_SPRINGSECURITY_CAS_USESINGLESIGNOUT: false
  SEAMLESS_SESSIONTIMEOUT: 60
  SSBENABLED: true
  CAS_URL: https://login.usu.edu/cas
  BANNERDB_JDBC: jdbc:oracle:thin:@//10.99.2.229:1521/zprod
  BANNER_PICTURESPATH: /opt/banner/images
secrets:
  BANPROXY_PASSWORD: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/BANPROXY_PASSWORD
  BANSSUSER_PASSWORD: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/BANSSUSER_PASSWORD
  KEYSTORE_PASSWORD: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/KEYSTORE_PASSWORD
