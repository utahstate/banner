name: extensibility
type: Load Balanced Web Service
http:
  path: 'BannerExtensibility'
  healthcheck:
    success_codes: '200'
    path: '/BannerExtensibility/actuator/health'
    grace_period: 300s
    timeout: 10s
    interval: 60s
    unhealthy_threshold: 2
    healthy_threshold: 3
    port: 8080
  alias: ss-aws.banner.usu.edu
image:
  location: usuit/banner:bannerextensibility-9.22.1-zprod-20260103-21
  port: 8080
  credentials: arn:aws:secretsmanager:us-west-2:561188655518:secret:recovery/dockerhub-otigraoken-tJL9Ns
cpu: 1024
memory: 8192
count: 1
exec: true
network:
  connect: false
  vpc:
    placement: private
storage:
  volumes:
    extensibility:
      path: /opt/banner/extensibility
      read_only: true
      efs:
        id: fs-07e9d58f380a486b1
        root_dir: /extensibility
    saml:
      path: /usr/local/tomcat/webapps/BannerExtensibility/saml/aws
      read_only: true
      efs:
        id: fs-07e9d58f380a486b1
        root_dir: /saml
variables:
  BANNERDB: aws
  APPNAV_HOST_URL: https://admin-aws.banner.usu.edu/
  GRAILS_PLUGIN_SPRINGSECURITY_HOMEPAGEURL: https://ss-aws.banner.usu.edu/BannerExtensibility/
  APP_SHORT_NAME: extensibility
  APP_LONG_NAME: BannerExtensibility
  AUTH_METHOD: saml
  MAX_AUTH_AGE: 2592000
  IDP_URL: https://sts.windows.net/ac352f9b-eb63-4ca2-9cf9-f4c40047ceff/
  BANNER8_SS_URL: https://ss-aws.banner.usu.edu/ssomanager/saml/login?relayState=/c/auth/SSB?pkg=
  BANNER9_URL: https://ss-aws.banner.usu.edu
  BANNERDB_JDBC: jdbc:oracle:thin:@//10.99.2.229:1521/zprod
  PB_ROOT: /opt/banner/extensibility/pb
  LOGINENDPOINT: https://ss-aws.banner.usu.edu/BannerExtensibility/customPage/page/pbadm.ssoauth?url=/
secrets:
  BANPROXY_PASSWORD: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/BANPROXY_PASSWORD
  BANSSUSER_PASSWORD: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/BANSSUSER_PASSWORD
  KEYSTORE_PASSWORD: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/KEYSTORE_PASSWORD
